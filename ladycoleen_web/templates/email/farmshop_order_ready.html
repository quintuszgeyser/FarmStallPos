<!DOCTYPE html>
<html><body style="font-family:Nunito,Arial,sans-serif;background:#fffdf7;margin:0;padding:20px">
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;border:2px solid #c9a96e">
  <h2 style="color:#16A34A;text-align:center;margin:0 0 8px">Your Order is Ready!</h2>
  <p style="color:#4a3a28;text-align:center;margin:0 0 24px">{{ order.reference }} is packed and waiting for you.</p>
  <p style="color:#4a3a28">Come collect your order at the {{ store_name_full }}. Please bring your order reference: <strong>{{ order.reference }}</strong></p>
  <hr style="border:none;border-top:1px dashed #c9a96e;margin:24px 0">
  <p style="color:#7a6944;font-size:13px;text-align:center;margin:0">{{ store_name_full }}</p>
</div>
</body></html>
