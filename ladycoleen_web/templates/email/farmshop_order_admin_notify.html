<!DOCTYPE html>
<html><body style="font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px">
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:8px;padding:24px">
  <h3 style="color:#927f57;margin:0 0 16px">New Farmshop Order - {{ reference }}</h3>
  <table style="width:100%;font-size:14px;border-collapse:collapse;margin-bottom:16px">
    {% for line in lines %}
    <tr><td style="padding:4px 0">{{ line.product_name_snapshot }} × {{ line.qty }}</td>
        <td style="text-align:right">R{{ "%.2f"|format(line.line_total) }}</td></tr>
    {% endfor %}
    <tr style="border-top:1px solid #eee">
      <td style="padding:8px 0 0;font-weight:700">Total</td>
      <td style="padding:8px 0 0;text-align:right;font-weight:700">R{{ "%.2f"|format(total) }}</td>
    </tr>
  </table>
  <p><a href="https://ladycoleen.co.za/admin/farmshop/{{ order_id }}" style="background:#927f57;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;font-weight:bold">Manage Order →</a></p>
</div>
</body></html>
