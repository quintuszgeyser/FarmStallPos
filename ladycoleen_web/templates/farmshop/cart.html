{% extends "base.html" %}
{% block title %}Cart - Lady Coleen Farm Shop{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:700px">
  <h2 class="lc-heading fw-bold mb-4">Your Cart</h2>

  <div id="cart-empty" class="text-center text-muted py-5 d-none">
    <p>Your cart is empty.</p>
    <a href="/farmshop/products" class="btn lc-btn-primary">Browse Products</a>
  </div>

  <div id="cart-content">
    <div id="cart-items"></div>
    <div class="lc-card p-3 mt-3">
      <div class="d-flex justify-content-between fw-bold fs-5">
        <span>Total</span>
        <span id="cart-total">R0.00</span>
      </div>
    </div>
    <a href="/farmshop/checkout" class="btn lc-btn-primary w-100 mt-3 btn-lg">Proceed to Checkout <i class="bi bi-arrow-right ms-1"></i></a>
    <a href="/farmshop/products" class="btn lc-btn-outline w-100 mt-2">Continue Shopping</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const cart = JSON.parse(localStorage.getItem('lc_cart') || '[]');
renderCart();

function renderCart() {
  const content = document.getElementById('cart-content');
  const empty   = document.getElementById('cart-empty');
  const items   = document.getElementById('cart-items');

  if (!cart.length) {
    content.classList.add('d-none');
    empty.classList.remove('d-none');
    return;
  }

  let total = 0;
  items.innerHTML = cart.map((item, i) => {
    total += item.price * (item.sold_by_weight ? 1 : item.qty);
    const thumbSrc = item.image_url ? `/product_images/${item.image_url.replace('.jpg','_thumb.jpg')}` : null;
    const imgHtml = thumbSrc
      ? `<img src="${thumbSrc}" alt="" loading="lazy" decoding="async" width="52" height="52" style="width:52px;height:52px;object-fit:cover;border-radius:6px;flex-shrink:0">`
      : `<div style="width:52px;height:52px;border-radius:6px;background:#f8f3e8;flex-shrink:0"></div>`;
    // Stock warning for this item
    let stockWarning = '';
    if (item.available_qty !== undefined) {
      const avail = item.available_qty;
      const qty   = item.qty;
      if (avail <= 0) {
        stockWarning = `<div class="text-danger" style="font-size:.75rem">Out of stock - available on order (longer lead time)</div>`;
      } else if (qty > avail) {
        const extra = qty - avail;
        stockWarning = `<div class="text-danger" style="font-size:.75rem">Only ${avail} available now - ${extra} will be ordered (longer lead time)</div>`;
      }
    }
    return `
    <div class="lc-card p-3 mb-2 d-flex align-items-center gap-3">
      ${imgHtml}
      <div class="flex-grow-1">
        <div class="fw-semibold">${item.name}</div>
        ${item.variant_attrs ? `<div class="text-muted" style="font-size:.75rem">${item.variant_attrs}</div>` : ''}
        <div class="text-muted small">${item.sold_by_weight ? item.display || item.qty+item.base_unit : 'x'+item.qty} - R${item.price.toFixed(2)}</div>
        ${stockWarning}
      </div>
      <div class="d-flex align-items-center gap-2 flex-shrink-0">
        ${!item.sold_by_weight ? `
          <button class="btn btn-sm lc-btn-outline" onclick="changeQty(${i}, -1)">−</button>
          <span style="min-width:2rem;text-align:center;font-weight:600">${item.qty}</span>
          <button class="btn btn-sm lc-btn-outline" onclick="changeQty(${i}, 1)">+</button>
        ` : ''}
        <button class="btn btn-sm btn-outline-danger ms-1" onclick="removeItem(${i})"><i class="bi bi-x-lg"></i></button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('cart-total').textContent = 'R' + total.toFixed(2);
}

function changeQty(i, delta) {
  cart[i].qty = Math.max(1, cart[i].qty + delta);
  cart[i].price = cart[i].price; // price per unit stays same
  save();
}

function removeItem(i) {
  cart.splice(i, 1);
  save();
}

function save() {
  localStorage.setItem('lc_cart', JSON.stringify(cart));
  renderCart();
}
</script>
{% endblock %}
