{% extends "base.html" %}
{% block title %}Create Account - {{ store_name }}{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:460px">
  <h2 class="lc-heading fw-bold mb-1">Create Account</h2>
  <p class="text-muted mb-4">Save your orders and track them anytime.</p>

  <div id="form-error" class="alert alert-danger d-none"></div>

  <form id="reg-form" class="lc-card p-4">
    <div class="mb-3">
      <label class="form-label fw-semibold">Name *</label>
      <input type="text" class="form-control lc-input" id="f-name" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email *</label>
      <input type="email" class="form-control lc-input" id="f-email" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Phone</label>
      <input type="tel" class="form-control lc-input" id="f-phone">
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password *</label>
      <input type="password" class="form-control lc-input" id="f-password" minlength="8" required>
      <div class="form-text">At least 8 characters.</div>
    </div>
    <button type="submit" class="btn lc-btn-primary w-100" id="submit-btn">Create Account</button>
  </form>

  <p class="text-center mt-3 text-muted small">Already have an account? <a href="/login">Sign in</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  document.getElementById('form-error').classList.add('d-none');

  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name:     document.getElementById('f-name').value,
      email:    document.getElementById('f-email').value,
      phone:    document.getElementById('f-phone').value,
      password: document.getElementById('f-password').value,
    })
  });
  const data = await res.json();

  if (res.ok) {
    LC.setToken(data.token);
    const next = new URLSearchParams(location.search).get('next') || '/account';
    window.location = next;
  } else {
    document.getElementById('form-error').textContent = data.error || 'Registration failed';
    document.getElementById('form-error').classList.remove('d-none');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});
</script>
{% endblock %}
