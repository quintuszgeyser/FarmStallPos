<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Lady Coleen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/doodle.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;background:var(--dd-surface)">
  <div style="width:100%;max-width:380px">
    <div class="text-center mb-4">
      <img src="/static/logo.svg" alt="Lady Coleen" height="64">
      <h4 class="fw-bold mt-3">Admin Login</h4>
    </div>
    <div class="lc-card p-4">
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" class="form-control lc-input" name="username" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control lc-input" name="password" required>
        </div>
        <button class="btn lc-btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
