# compose.template.yml - the appliance stack for a NEW store box.
# POS-only: postgres + pos. No recognition, no Frigate, no web shop (all excluded
# from appliance boxes by design). Consumes a PINNED image tag from GHCR - no build.
# All config comes from the rendered .env (which register-store.sh generates).
#
# Copied to /opt/farmpos/docker-compose.yml at provision time. `docker compose up -d`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmpos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      # Entrypoint init - creates the DB on an EMPTY data dir only (no-op on restore).
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"     # never LAN-exposed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [farmpos_network]

  pos:
    image: ${POS_IMAGE}           # ghcr.io/quintuszgeyser/farmpos-pos:${FARMPOS_VERSION}
    container_name: farmpos-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env                # STORE_ID, secrets, scale, etc.
    volumes:
      - ./data/pos-config:/app/config
      - ./data/pos-logs:/app/logs
      - ./data/product-images:/app/static/product_images
      - ./data/supplier-docs:/app/static/supplier_docs
      # Runtime-uploaded branding (logo) - persisted across container rebuilds.
      - ./data/branding:/app/static/branding
      # Per-store logo overrides the image default (falls back to shipped logo if absent).
      - ./store/logo.svg:/app/static/logo.svg:ro
    ports:
      - "5000:5000"
    networks: [farmpos_network]

  # Web shop - only included when web_shop.enabled=true in store.yml.
  # register-store.sh renders this block conditionally via WEB_ENABLED flag.
  web:
    image: ${WEB_IMAGE}           # ghcr.io/quintuszgeyser/farmpos-web:${FARMPOS_VERSION}
    container_name: farmpos-web
    restart: unless-stopped
    profiles: ["web"]             # only starts when --profile web is passed
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      APP_ENV: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      SITE_URL: "http://${WEB_DOMAIN:-localhost:5001}"
      WEB_DOMAIN: ${WEB_DOMAIN:-}
      PAYFAST_MERCHANT_ID: ${PAYFAST_MERCHANT_ID:-}
      PAYFAST_MERCHANT_KEY: ${PAYFAST_MERCHANT_KEY:-}
      PAYFAST_PASSPHRASE: ${PAYFAST_PASSPHRASE:-}
      PAYFAST_SANDBOX: ${PAYFAST_SANDBOX:-true}
    volumes:
      # The web app's /product_images/<f> route serves from /app/product_images
      # (os.path.dirname(__file__)/product_images), NOT /app/static/. Mount there
      # or images 404 on the shop while resolving fine in the POS.
      - ./data/product-images:/app/product_images
      - ./data/web-uploads:/app/uploads
      - ./data/web-logs:/app/logs
      # Runtime white-label logo uploaded via the POS - the web app serves it from
      # /app/brand_logos (see serve_brand_logo). Same dir the POS writes to.
      - ./data/branding:/app/brand_logos:ro
    ports:
      - "5001:5001"
    networks: [farmpos_network]

networks:
  farmpos_network:
    driver: bridge
