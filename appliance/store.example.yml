# store.yml - per-store identity & flags (NON-secret, safe to keep in git/backup).
# Copied and filled by register-store.sh. Secrets NEVER live here - they are
# generated into /opt/farmpos/secrets/ and rendered into .env at provision time.

# Immutable, DNS-safe primary key of this box. Drives hostname, DB, backup path.
store_id: boer-and-butcher

# Shown in the POS UI, page title, and on invoices.
store_name: "Boer & Butcher"
store_tagline: "Butchery & Deli"          # nav sub-line; defaults to store_name
store_legal: "Boer & Butcher (Pty) Ltd"   # invoice "From" heading; defaults to store_name
store_subtitle: "Fresh Cuts & Farm Deli"  # invoice sub-line

timezone: "Africa/Johannesburg"

# Pins the container image tag this box runs. Bump to update; never use :latest.
farmpos_version: "v2.1.5"

# Scale (Ishida BC-4000). enabled:false => POS runs fine with no scale at all.
scale:
  enabled: true
  ip: "10.0.0.50"     # set the router DHCP reservation to this before install
  port: 7061

# Web shop is OFF by default. Enabling it starts the farmpos-web container on port 5001.
# Requires a domain (for Cloudflare tunnel) + PayFast merchant credentials.
web_shop:
  enabled: false
  domain: ""                      # e.g. shop.yourstall.co.za
  payfast_merchant_id: ""
  payfast_merchant_key: ""
  payfast_passphrase: ""          # moves to secrets/ on future hardening pass

# Nightly off-box backup target (rclone remote). Leave blank for local-only.
backup:
  target: ""          # e.g. "b2:farmpos-backups"
  time: "02:00"

# Tailscale remote access. Get a reusable auth key from tailscale.com/admin/settings/keys.
# The box joins as farmpos-<store_id> so you can SSH it from anywhere via Tailscale.
tailscale:
  enabled: false
  auth_key: ""   # tskey-auth-...

# Where fleet-health heartbeats POST (blank = monitoring not wired yet).
control_center_url: ""

alerts:
  email: "owner@example.co.za"
