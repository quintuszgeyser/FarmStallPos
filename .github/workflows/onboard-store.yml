name: Onboard New Store

# Triggered manually from GitHub Actions → Run workflow.
#
# What this workflow does:
#   1. Validates the image version tag exists as a published release
#   2. Generates a one-time ephemeral Tailscale auth key for this store (via TS API)
#   3. Generates a pre-filled store.yml
#   4. Outputs a single bootstrap command to paste on the box
#
# The box does all the actual work — it only needs outbound internet.
# No inbound SSH from GitHub, no open ports, works on any LAN.
#
# ── INITIAL ACCESS NOTE ──────────────────────────────────────────────────────
# To paste the bootstrap command you need a shell on the box first.
# Ubuntu 24.04 Server: the installer creates a user+password — use that to SSH in.
# Ubuntu 24.04 cloud image: use the cloud provider's console/serial access.
# Once bootstrap.sh completes, all future access is via your SSH key over Tailscale.
#
# ── REPO SECRETS REQUIRED (Settings → Secrets → Actions) ────────────────────
#   TAILSCALE_API_KEY        — Tailscale API key (generate at tailscale.com/admin/settings/keys)
#                              used to create a one-time ephemeral auth key per store
#   TAILSCALE_TAILNET        — your tailnet name (e.g. "example.com" or "yourname.github")
#                              find it at tailscale.com/admin/machines → top of page
#   GHCR_PAT                 — GitHub PAT with read:packages (pulls the pinned image)
#   SUPPORT_AGE_PUB          — your central age public key (all store backups encrypted to this)
#   OPERATOR_SSH_PUBLIC_KEY  — your SSH public key (added to root's authorized_keys on every box)
#
# ── PER-ONBOARD INPUTS (just 2 required) ─────────────────────────────────────
#   store_name     — display name shown in the UI (e.g. "Boer & Butcher")
#   image_version  — exact release tag to install (e.g. v2.2.0)
#
# ── OPTIONAL INPUTS ──────────────────────────────────────────────────────────
#   store_id       — kebab-case slug (auto-derived from store_name if blank)
#   enable_web_shop — start the web shop container? (default: false)

on:
  workflow_dispatch:
    inputs:
      store_name:
        description: 'Store display name (e.g. "Boer & Butcher")'
        required: true
        type: string
      store_id:
        description: 'store_id override — kebab-case slug (leave blank to auto-derive from name)'
        required: false
        default: ''
        type: string
      image_version:
        description: 'Image version to install (e.g. v2.2.0) — must be a published release tag'
        required: true
        type: string
      enable_web_shop:
        description: 'Enable web shop container?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  generate-bootstrap:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Validate image version tag exists in the repo ─────────────────
      - name: Validate image version
        run: |
          TAG="${{ github.event.inputs.image_version }}"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${TAG}")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Tag '${TAG}' not found in repo. Push it first: git tag ${TAG} && git push origin ${TAG}"
            exit 1
          fi
          echo "✅ Tag ${TAG} confirmed"

      # ── 2. Derive / validate store_id ─────────────────────────────────────
      - name: Derive store_id
        id: ids
        run: |
          OVERRIDE="${{ github.event.inputs.store_id }}"
          if [ -n "$OVERRIDE" ]; then
            echo "$OVERRIDE" | grep -Eq '^[a-z0-9-]{1,40}$' || {
              echo "::error::store_id must be lowercase kebab-case, max 40 chars (got: $OVERRIDE)"
              exit 1
            }
            STORE_ID="$OVERRIDE"
          else
            STORE_ID=$(echo "${{ github.event.inputs.store_name }}" \
              | python3 -c "
          import sys, re
          name = sys.stdin.read().strip()
          slug = re.sub(r'[^a-z0-9]+', '-', name.lower()).strip('-')[:40]
          print(slug)
              ")
          fi
          echo "store_id=$STORE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved store_id: '$STORE_ID'"

      # ── 3. Generate a one-time ephemeral Tailscale auth key for this store ─
      # Per-store ephemeral + preauthorized key (no tags — avoids ACL tag
      # pre-creation requirement). Single-use, 90-day TTL. A compromised box
      # cannot register rogue devices since the key is already consumed.
      - name: Generate ephemeral Tailscale auth key
        id: tskey
        env:
          TS_API_KEY:  ${{ secrets.TAILSCALE_API_KEY }}
          TS_TAILNET:  ${{ secrets.TAILSCALE_TAILNET }}
          STORE_ID:    ${{ steps.ids.outputs.store_id }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${TS_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"capabilities\": {
                \"devices\": {
                  \"create\": {
                    \"reusable\": false,
                    \"ephemeral\": true,
                    \"preauthorized\": true
                  }
                }
              },
              \"expirySeconds\": 7776000,
              \"description\": \"farmpos-${STORE_ID} onboard\"
            }" \
            "https://api.tailscale.com/api/v2/tailnet/${TS_TAILNET}/keys")

          TS_AUTH_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])" 2>/dev/null || true)
          if [ -z "$TS_AUTH_KEY" ]; then
            echo "::error::Failed to generate Tailscale auth key."
            echo "::error::Check: TAILSCALE_API_KEY valid? TAILSCALE_TAILNET='${TS_TAILNET}' correct?"
            echo "API response: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$TS_AUTH_KEY"
          echo "ts_auth_key=$TS_AUTH_KEY" >> "$GITHUB_OUTPUT"
          echo "✅ Ephemeral Tailscale auth key generated for farmpos-${STORE_ID}"

      # ── 4. Checkout (to read support_age.pub from repo) ───────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 5. Generate store.yml ─────────────────────────────────────────────
      - name: Generate store.yml
        env:
          STORE_ID:   ${{ steps.ids.outputs.store_id }}
          STORE_NAME: ${{ github.event.inputs.store_name }}
          STORE_VER:  ${{ github.event.inputs.image_version }}
          TS_KEY:     ${{ steps.tskey.outputs.ts_auth_key }}
          WEB_SHOP:   ${{ github.event.inputs.enable_web_shop }}
        run: |
          python3 - <<'PY'
          import os, yaml

          store_id   = os.environ['STORE_ID']
          store_name = os.environ['STORE_NAME']
          ver        = os.environ['STORE_VER']
          ts_key     = os.environ['TS_KEY']
          web_shop   = os.environ['WEB_SHOP'].lower() == 'true'

          cfg = {
            'store_id':        store_id,
            'store_name':      store_name,
            'store_tagline':   store_name,
            'store_legal':     store_name,
            'store_subtitle':  '',
            'timezone':        'Africa/Johannesburg',
            'farmpos_version': ver,
            'scale':     {'enabled': False, 'ip': '', 'port': 7061},
            'web_shop':  {
              'enabled':              web_shop,
              'domain':               '',
              'payfast_merchant_id':  '',
              'payfast_merchant_key': '',
              'payfast_passphrase':   '',
              'payfast_sandbox':      'true',  # lowercase string — yaml_or reads it as-is
            },
            'backup':    {'target': '', 'time': '02:00'},
            'tailscale': {'enabled': True, 'auth_key': ts_key},
            'control_center_url': '',
            'alerts':    {'email': ''},
          }

          with open('/tmp/store.yml', 'w') as f:
            yaml.safe_dump(cfg, f, sort_keys=False, allow_unicode=True)

          # Print store.yml with the Tailscale key redacted — it will be masked
          # in GitHub logs via ::add-mask but we redact in our own print too.
          import copy
          safe = copy.deepcopy(cfg)
          safe['tailscale']['auth_key'] = '***'
          print("Generated store.yml (key redacted):")
          print(yaml.dump(safe, sort_keys=False))
          PY

      # ── 6. Encode payload ─────────────────────────────────────────────────
      - name: Encode payload
        id: payload
        run: |
          STORE_YML_B64=$(base64 -w0 /tmp/store.yml)
          echo "store_yml_b64=$STORE_YML_B64" >> "$GITHUB_OUTPUT"

          # Mask the encoded store.yml too (contains TS key)
          echo "::add-mask::$STORE_YML_B64"

          # Support age public key
          SUPPORT_PUB=$(grep -v '^#' "appliance/support_age.pub" 2>/dev/null | head -1 || true)
          if [ -z "${SUPPORT_PUB:-}" ]; then
            SUPPORT_PUB="${{ secrets.SUPPORT_AGE_PUB }}"
          fi
          SUPPORT_PUB_B64=$(printf '%s' "$SUPPORT_PUB" | base64 -w0)
          echo "support_pub_b64=$SUPPORT_PUB_B64" >> "$GITHUB_OUTPUT"

          # Operator SSH public key
          SSH_PUBKEY_B64=$(printf '%s' "${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}" | base64 -w0)
          echo "ssh_pubkey_b64=$SSH_PUBKEY_B64" >> "$GITHUB_OUTPUT"

          # GHCR PAT — mask before encoding
          GHCR_PAT="${{ secrets.GHCR_PAT }}"
          echo "::add-mask::$GHCR_PAT"
          GHCR_PAT_B64=$(printf '%s' "$GHCR_PAT" | base64 -w0)
          echo "::add-mask::$GHCR_PAT_B64"
          echo "ghcr_pat_b64=$GHCR_PAT_B64" >> "$GITHUB_OUTPUT"

      # ── 7. Output bootstrap command ───────────────────────────────────────
      # The command is delivered via a file passed to bash stdin so that no
      # secrets appear as process arguments (avoids bash history exposure).
      - name: Output bootstrap command
        env:
          STORE_ID:        ${{ steps.ids.outputs.store_id }}
          STORE_VER:       ${{ github.event.inputs.image_version }}
          STORE_YML_B64:   ${{ steps.payload.outputs.store_yml_b64 }}
          SUPPORT_PUB_B64: ${{ steps.payload.outputs.support_pub_b64 }}
          SSH_PUBKEY_B64:  ${{ steps.payload.outputs.ssh_pubkey_b64 }}
          GHCR_PAT_B64:    ${{ steps.payload.outputs.ghcr_pat_b64 }}
          REPO:            ${{ github.repository }}
        run: |
          # Build the inner script content that the box will run.
          # Delivered via a tmpfile piped to bash — never appears in ps or history.
          INNER=$(cat <<INNEREOF
          export FARMPOS_STORE_YML="${STORE_YML_B64}"
          export FARMPOS_SUPPORT_PUB="${SUPPORT_PUB_B64}"
          export FARMPOS_GHCR_PAT_B64="${GHCR_PAT_B64}"
          export FARMPOS_SSH_PUBKEY="${SSH_PUBKEY_B64}"
          export FARMPOS_VERSION="${STORE_VER}"
          curl -fsSL "https://raw.githubusercontent.com/${REPO}/main/appliance/bootstrap.sh" | bash
          INNEREOF
          )

          INNER_B64=$(printf '%s' "$INNER" | base64 -w0)

          cat <<EOF

          ════════════════════════════════════════════════════════════
           STORE: ${STORE_ID}  (${STORE_VER})
          ════════════════════════════════════════════════════════════

           STEP 1 — Get a shell on the box:
             Ubuntu Server: ssh <installer-user>@<lan-ip>  (password you set during install)
             Cloud image:   use cloud provider's serial/console access

           STEP 2 — Start a screen session so the install survives disconnects:
             screen -S farmpos
             (if disconnected: screen -r farmpos to reconnect)

           STEP 3 — Paste this ONE command (takes ~5-10 min):

          sudo bash -c 'echo "${INNER_B64}" | base64 -d | bash'

          ════════════════════════════════════════════════════════════
           Secrets passed via env vars — NOT in bash history or ps.
           ⚠  This command is ONE-TIME USE — the Tailscale key is
              consumed on first join. If the box needs to be wiped
              and re-provisioned, run this workflow again.

           After install, all future access via your SSH key:
             ssh root@<tailscale-ip>   (anywhere via Tailscale)
             ssh root@<lan-ip>         (LAN only)
          ════════════════════════════════════════════════════════════

          EOF

      # ── 8. Upload store.yml artifact (secrets stripped) ───────────────────
      # Strip the Tailscale auth key before uploading — the artifact is an
      # audit record of store identity, not a secrets store.
      - name: Upload redacted store.yml artifact
        run: |
          python3 - <<'PY'
          import yaml, copy
          with open('/tmp/store.yml') as f:
            cfg = yaml.safe_load(f)
          redacted = copy.deepcopy(cfg)
          redacted['tailscale']['auth_key'] = '<redacted — one-time key used during onboard>'
          with open('/tmp/store-redacted.yml', 'w') as f:
            yaml.safe_dump(redacted, f, sort_keys=False, allow_unicode=True)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: store-yml-${{ steps.ids.outputs.store_id }}-${{ github.event.inputs.image_version }}
          path: /tmp/store-redacted.yml
          retention-days: 90
