name: Onboard New Store

# Triggered manually from GitHub Actions → Run workflow.
#
# What this workflow does:
#   1. Validates inputs + resolves the image version tag
#   2. Generates a pre-filled store.yml
#   3. Outputs a single bootstrap command you paste on the box
#
# The box does all the actual work — it only needs outbound internet.
# No inbound SSH from GitHub, no open ports, works on any LAN.
#
# Repo secrets required (Settings → Secrets → Actions):
#   SUPPORT_AGE_PUB  — your central age public key (all store backups encrypted to this)
#
# Per-onboard inputs (see below):
#   store_name     — display name shown in the UI
#   store_id       — kebab-case slug (auto-derived if left blank)
#   image_version  — exact tag to install, e.g. v2.2.0
#   tailscale_key  — tskey-auth-... (reusable, no-expiry)
#   ghcr_pat       — GitHub PAT with read:packages (used only for docker login on the box)
#   enable_web_shop — start the web shop container?

on:
  workflow_dispatch:
    inputs:
      store_name:
        description: 'Store display name (e.g. "Boer & Butcher")'
        required: true
        type: string
      store_id:
        description: 'store_id override — kebab-case slug (leave blank to auto-derive from name)'
        required: false
        default: ''
        type: string
      image_version:
        description: 'Image version to install (e.g. v2.2.0) — must be a published release tag'
        required: true
        type: string
      tailscale_key:
        description: 'Tailscale reusable auth key (tskey-auth-...)'
        required: true
        type: string
      ghcr_pat:
        description: 'GitHub PAT with read:packages — used only for docker login on the box'
        required: true
        type: string
      enable_web_shop:
        description: 'Enable web shop container?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  generate-bootstrap:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Validate image version exists on GHCR ──────────────────────────
      - name: Validate image version
        run: |
          TAG="${{ github.event.inputs.image_version }}"
          # Check the tag exists as a GitHub release
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Release tag '${TAG}' not found. Create a release first: git tag ${TAG} && git push origin ${TAG}"
            exit 1
          fi
          echo "✅ Release ${TAG} confirmed"

      # ── 2. Derive / validate store_id ─────────────────────────────────────
      - name: Derive store_id
        id: ids
        run: |
          OVERRIDE="${{ github.event.inputs.store_id }}"
          if [ -n "$OVERRIDE" ]; then
            # Validate supplied store_id
            echo "$OVERRIDE" | grep -Eq '^[a-z0-9-]{1,40}$' || {
              echo "::error::store_id must be lowercase kebab-case, max 40 chars (got: $OVERRIDE)"
              exit 1
            }
            STORE_ID="$OVERRIDE"
          else
            # Auto-derive from store_name
            STORE_ID=$(echo "${{ github.event.inputs.store_name }}" \
              | python3 -c "
          import sys, re
          name = sys.stdin.read().strip()
          slug = re.sub(r'[^a-z0-9]+', '-', name.lower()).strip('-')[:40]
          print(slug)
              ")
          fi
          echo "store_id=$STORE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved store_id: '$STORE_ID'"

      # ── 3. Checkout (to read support_age.pub from repo) ───────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 4. Generate store.yml ─────────────────────────────────────────────
      - name: Generate store.yml
        id: storeyml
        env:
          STORE_ID:   ${{ steps.ids.outputs.store_id }}
          STORE_NAME: ${{ github.event.inputs.store_name }}
          STORE_VER:  ${{ github.event.inputs.image_version }}
          TS_KEY:     ${{ github.event.inputs.tailscale_key }}
          WEB_SHOP:   ${{ github.event.inputs.enable_web_shop }}
        run: |
          python3 - <<'PY'
          import os, yaml

          store_id   = os.environ['STORE_ID']
          store_name = os.environ['STORE_NAME']
          ver        = os.environ['STORE_VER']
          ts_key     = os.environ['TS_KEY']
          web_shop   = os.environ['WEB_SHOP'].lower() == 'true'

          cfg = {
            'store_id':       store_id,
            'store_name':     store_name,
            'store_tagline':  store_name,
            'store_legal':    store_name,
            'store_subtitle': '',
            'timezone':       'Africa/Johannesburg',
            'farmpos_version': ver,
            'scale': {'enabled': False, 'ip': '', 'port': 7061},
            'web_shop': {
              'enabled':              web_shop,
              'domain':               '',
              'payfast_merchant_id':  '',
              'payfast_merchant_key': '',
              'payfast_passphrase':   '',
            },
            'backup':    {'target': '', 'time': '02:00'},
            'tailscale': {'enabled': True, 'auth_key': ts_key},
            'control_center_url': '',
            'alerts': {'email': ''},
          }

          with open('/tmp/store.yml', 'w') as f:
            yaml.safe_dump(cfg, f, sort_keys=False, allow_unicode=True)

          print("Generated store.yml:")
          print(open('/tmp/store.yml').read())
          PY

      # ── 5. Base64-encode store.yml + support_age.pub for the bootstrap cmd ──
      - name: Encode payload
        id: payload
        run: |
          STORE_YML_B64=$(base64 -w0 /tmp/store.yml)
          echo "store_yml_b64=$STORE_YML_B64" >> "$GITHUB_OUTPUT"

          # Use support_age.pub from repo if present, else from secret
          if [ -f "farm_pos_web/appliance/support_age.pub" ] && \
             ! grep -q '^#' "farm_pos_web/appliance/support_age.pub" 2>/dev/null || \
             grep -qv '^#' "farm_pos_web/appliance/support_age.pub" 2>/dev/null; then
            SUPPORT_PUB=$(grep -v '^#' "farm_pos_web/appliance/support_age.pub" | head -1)
          fi
          if [ -z "${SUPPORT_PUB:-}" ]; then
            SUPPORT_PUB="${{ secrets.SUPPORT_AGE_PUB }}"
          fi
          SUPPORT_PUB_B64=$(printf '%s' "$SUPPORT_PUB" | base64 -w0)
          echo "support_pub_b64=$SUPPORT_PUB_B64" >> "$GITHUB_OUTPUT"

      # ── 6. Output the bootstrap command ──────────────────────────────────
      - name: Output bootstrap command
        env:
          STORE_ID:        ${{ steps.ids.outputs.store_id }}
          STORE_VER:       ${{ github.event.inputs.image_version }}
          GHCR_PAT:        ${{ github.event.inputs.ghcr_pat }}
          STORE_YML_B64:   ${{ steps.payload.outputs.store_yml_b64 }}
          SUPPORT_PUB_B64: ${{ steps.payload.outputs.support_pub_b64 }}
          REPO:            ${{ github.repository }}
          REF:             ${{ github.ref_name }}
        run: |
          cat <<EOF

          ════════════════════════════════════════════════════════════
           STORE: $STORE_ID  ($STORE_VER)
           Ready to install. Paste this ONE command on the target box
           (requires only outbound internet — no open ports needed):
          ════════════════════════════════════════════════════════════

          sudo bash -c 'curl -fsSL "https://raw.githubusercontent.com/${REPO}/main/farm_pos_web/appliance/bootstrap.sh" | bash -s -- \\
            --store-yml     "${STORE_YML_B64}" \\
            --support-pub   "${SUPPORT_PUB_B64}" \\
            --ghcr-pat      "${GHCR_PAT}" \\
            --version       "${STORE_VER}"'

          ════════════════════════════════════════════════════════════
           The command above is safe to share with the person doing
           the physical install. It expires when the Tailscale key
           expires. The GHCR PAT only has read:packages scope.
          ════════════════════════════════════════════════════════════

          EOF

      # ── 7. Upload store.yml as artifact (audit trail) ─────────────────────
      - name: Upload store.yml artifact
        uses: actions/upload-artifact@v4
        with:
          name: store-yml-${{ steps.ids.outputs.store_id }}-${{ github.event.inputs.image_version }}
          path: /tmp/store.yml
          retention-days: 90
