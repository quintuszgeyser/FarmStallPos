name: Release POS + Web images

# Build pinned, reproducible images and push them to GHCR on a version tag.
# This is the fleet release channel for appliance boxes. The POS image only
# pushes if the migration smoke test passes.
#
# Usage:  git tag v1.7.0 && git push origin v1.7.0
# Result: ghcr.io/quintuszgeyser/farmpos-pos:v1.7.0  (+ :latest)
#         ghcr.io/quintuszgeyser/farmpos-web:v1.7.0  (+ :latest)
#
# Does NOT affect the Lady Coleen box, which still builds from its own server-side
# Dockerfiles via deploy.sh.

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/farmpos-pos
  WEB_IMAGE: ${{ github.repository_owner }}/farmpos-web

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, load into the local docker daemon so we can smoke-test the exact
      # bits before they are ever pushed.
      - name: Build image (local, for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: farmpos-pos:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Migration smoke test - the guardrail for fleet-wide strong_migrate().
      # Boot the freshly built image against an EMPTY Postgres and assert the app
      # comes up healthy (which only happens after strong_migrate() + seed succeed).
      - name: Smoke test - migrate against empty Postgres + /health
        run: |
          set -euo pipefail
          docker network create farmpos-ci
          docker run -d --name ci-pg --network farmpos-ci \
            -e POSTGRES_USER=farmstall \
            -e POSTGRES_PASSWORD=ci-test-pw \
            -e POSTGRES_DB=farmpos \
            postgres:16-alpine
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do
            if docker exec ci-pg pg_isready -U farmstall >/dev/null 2>&1; then break; fi
            sleep 2
          done
          # STORE_ID set => exercises the strict appliance path (secrets required).
          docker run -d --name ci-pos --network farmpos-ci -p 5000:5000 \
            -e APP_ENV=prod \
            -e STORE_ID=ci-smoke \
            -e STORE_NAME="CI Smoke Store" \
            -e SECRET_KEY=ci-secret-key-not-default \
            -e ADMIN_PASS=ci-admin-not-default \
            -e DATABASE_URL="postgresql://farmstall:ci-test-pw@ci-pg:5432/farmpos" \
            farmpos-pos:ci
          echo "Waiting for POS /health..."
          ok=0
          for i in $(seq 1 45); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/health || true)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            echo "::error::POS did not become healthy - migration or startup failed."
            echo "--- ci-pos logs ---"; docker logs ci-pos || true
            exit 1
          fi
          echo "Smoke test passed: image boots healthy against an empty DB."
          # Prove the strict guards actually fire: a box with the known-bad default
          # SECRET_KEY and a STORE_ID MUST refuse to start.
          if docker run --rm --network farmpos-ci \
              -e APP_ENV=prod -e STORE_ID=guard-test \
              -e DATABASE_URL="postgresql://farmstall:ci-test-pw@ci-pg:5432/farmpos" \
              farmpos-pos:ci python -c "import app" 2>/dev/null; then
            echo "::error::Guard did not fire - a provisioned box booted with dev-secret-key."
            exit 1
          fi
          echo "Guard test passed: provisioned box refuses the dev SECRET_KEY."

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only reached if the smoke test passed. Push the pinned semver tag + latest.
      - name: Build and push pinned image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Upgrade-path smoke test (ISSUE-46): boots the previous released tag against
  # a populated DB, then restarts with the new image, and asserts /health + key
  # columns exist. Catches migration regressions that only fire on an upgrade
  # (a fresh DB always passes because db.create_all() builds the full schema).
  upgrade-smoke:
    runs-on: ubuntu-latest
    needs: build-test-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new image (built by build-test-push)
        run: docker pull "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}"

      - name: Tag it as farmpos-pos:ci for the upgrade test
        run: docker tag "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}" farmpos-pos:ci

      - name: Derive previous tag
        id: prev
        run: |
          # Fetch the last two semver tags; the older one is the "previous release".
          prev=$(git ls-remote --tags --sort=-v:refname \
            https://github.com/${{ github.repository }}.git \
            'refs/tags/v*' \
            | awk '{print $2}' | sed 's|refs/tags/||' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -2 | tail -1)
          if [ -z "$prev" ]; then
            echo "No previous tag found — skipping upgrade test"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "prev=$prev" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run upgrade-path smoke test
        if: steps.prev.outputs.skip != 'true'
        run: |
          set -euo pipefail
          PREV=${{ steps.prev.outputs.prev }}
          NEW=${{ steps.ver.outputs.version }}
          REGISTRY=${{ env.REGISTRY }}
          IMAGE=${{ env.IMAGE }}

          docker network create farmpos-upgrade-ci

          # Boot fresh Postgres
          docker run -d --name upg-pg --network farmpos-upgrade-ci \
            -e POSTGRES_USER=farmstall \
            -e POSTGRES_PASSWORD=ci-test-pw \
            -e POSTGRES_DB=farmpos \
            postgres:16-alpine
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do
            if docker exec upg-pg pg_isready -U farmstall >/dev/null 2>&1; then break; fi
            sleep 2
          done

          # Boot PREVIOUS released image so it runs strong_migrate() on empty DB
          docker run -d --name upg-prev --network farmpos-upgrade-ci \
            -e APP_ENV=prod \
            -e SECRET_KEY=ci-upgrade-key \
            -e DATABASE_URL="postgresql://farmstall:ci-test-pw@upg-pg:5432/farmpos" \
            "${REGISTRY}/${IMAGE}:${PREV}"
          echo "Waiting for previous image /health..."
          ok=0
          for i in $(seq 1 45); do
            code=$(docker exec upg-prev curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/health || true)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Previous image did not become healthy"
            docker logs upg-prev || true; exit 1
          fi
          echo "Previous image healthy — DB is now populated with ${PREV} schema"

          # Stop previous, start NEW image on the same (populated) DB
          docker stop upg-prev && docker rm upg-prev
          docker run -d --name upg-new --network farmpos-upgrade-ci -p 5001:5000 \
            -e APP_ENV=prod \
            -e SECRET_KEY=ci-upgrade-key \
            -e DATABASE_URL="postgresql://farmstall:ci-test-pw@upg-pg:5432/farmpos" \
            farmpos-pos:ci
          echo "Waiting for new image /health after upgrade..."
          ok=0
          for i in $(seq 1 45); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/health || true)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            echo "::error::New image failed health after upgrade from ${PREV}"
            docker logs upg-new || true; exit 1
          fi

          # Assert key columns added by recent migrations exist
          for col in payment_method cash_tendered; do
            result=$(docker exec upg-pg psql -U farmstall -d farmpos -tAc \
              "SELECT column_name FROM information_schema.columns \
               WHERE table_name='sales' AND column_name='${col}'" || true)
            if [ -z "$result" ]; then
              echo "::error::Column sales.${col} missing after upgrade from ${PREV}"
              exit 1
            fi
          done
          echo "Upgrade smoke test passed: ${PREV} → ${NEW} migrates cleanly."

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ladycoleen_web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
